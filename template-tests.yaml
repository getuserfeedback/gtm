scenarios:
- name: Loader URL uses encoded API key
  code: |-
    let capturedUrl = '';

    mock('queryPermission', function(permissionId) {
      return permissionId === 'inject_script';
    });

    mock('encodeUriComponent', function(value) {
      return 'encoded-' + value;
    });

    mock('injectScript', function(url, onSuccess) {
      capturedUrl = url;
      onSuccess();
    });

    runCode({
      apiKey: 'test-api-key',
      themeMode: 'host',
      themeAttr: 'class,data-theme',
      consentMode: 'automatic',
      identifyMode: 'disabled'
    });

    assertThat(capturedUrl).isEqualTo('https://cdn.getuserfeedback.com/widget/loader/v1/encoded-test-api-key/loader.js');

- name: Permission denial skips script injection
  code: |-
    let injectScriptCalls = 0;

    mock('queryPermission', function() {
      return false;
    });

    mock('encodeUriComponent', function(value) {
      return value;
    });

    mock('injectScript', function() {
      injectScriptCalls = injectScriptCalls + 1;
    });

    runCode({
      apiKey: 'test-api-key',
      themeMode: 'host',
      themeAttr: 'class,data-theme',
      consentMode: 'automatic',
      identifyMode: 'disabled'
    });

    assertThat(injectScriptCalls).isEqualTo(0);

- name: Fixed light theme sets init colorScheme
  code: |-
    let queuedCommands = [];

    mock('queryPermission', function(permissionId) {
      return permissionId === 'inject_script';
    });

    mock('encodeUriComponent', function(value) {
      return value;
    });

    mock('injectScript', function(url, onSuccess) {
      onSuccess();
    });

    mock('createQueue', function() {
      return function(command) {
        queuedCommands.push(command);
      };
    });

    runCode({
      apiKey: 'test-api-key',
      themeMode: 'light',
      consentMode: 'automatic',
      identifyMode: 'disabled'
    });

    assertThat(queuedCommands.length).isEqualTo(1);
    assertThat(queuedCommands[0].command.kind).isEqualTo('init');
    assertThat(queuedCommands[0].command.opts.colorScheme).isEqualTo('light');

