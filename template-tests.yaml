- name: Manual consent uses configured mappings
  code: |-
    let queuedCommands = [];

    mock('queryPermission', function(permissionId) {
      return permissionId === 'inject_script';
    });

    mock('encodeUriComponent', function(value) {
      return value;
    });

    mock('injectScript', function(url, onSuccess) {
      onSuccess();
    });

    mock('createQueue', function() {
      return function(command) {
        queuedCommands.push(command);
      };
    });

    mock('isConsentGranted', function(consentType) {
      return consentType === 'ad_storage';
    });

    runCode({
      apiKey: 'test-api-key',
      themeMode: 'host',
      themeAttr: 'class,data-theme',
      consentMode: 'manual',
      scopeMappings: [
        { scope: 'ads.storage', mapping: 'ad_storage' },
        { scope: 'analytics.storage', mapping: 'analytics_storage' }
      ],
      identifyMode: 'disabled'
    });

    assertThat(queuedCommands[0].command.opts.defaultConsent).containsExactly('ads.storage');

- name: Intelligent identity reads common data layer signals
  code: |-
    let queuedCommands = [];

    mock('queryPermission', function(permissionId) {
      return permissionId === 'inject_script' || permissionId === 'read_data_layer';
    });

    mock('encodeUriComponent', function(value) {
      return value;
    });

    mock('copyFromDataLayer', function(key) {
      if (key === 'userId') return 'user_123';
      if (key === 'email') return 'user@example.com';
      if (key === 'phone') return '+61400000000';
      return undefined;
    });

    mock('injectScript', function(url, onSuccess) {
      onSuccess();
    });

    mock('createQueue', function() {
      return function(command) {
        queuedCommands.push(command);
      };
    });

    runCode({
      apiKey: 'test-api-key',
      themeMode: 'host',
      themeAttr: 'class,data-theme',
      consentMode: 'automatic',
      identifyMode: 'intelligent'
    });

    assertThat(queuedCommands.length).isEqualTo(2);
    assertThat(queuedCommands[1].command.kind).isEqualTo('identify');
    assertThat(queuedCommands[1].command.userId).isEqualTo('user_123');
    assertThat(queuedCommands[1].command.traits.email).isEqualTo('user@example.com');
    assertThat(queuedCommands[1].command.traits.phone).isEqualTo('+61400000000');

