- name: Automatic consent includes analytics measurement when analytics storage is granted
  code: |-
    let queuedCommands = [];

    mock('queryPermission', function(permissionId) {
      return permissionId === 'inject_script';
    });

    mock('encodeUriComponent', function(value) {
      return value;
    });

    mock('injectScript', function(url, onSuccess) {
      onSuccess();
    });

    mock('createQueue', function() {
      return function(command) {
        queuedCommands.push(command);
      };
    });

    mock('isConsentGranted', function(consentType) {
      return consentType === 'analytics_storage';
    });

    runCode({
      apiKey: 'test-api-key',
      themeMode: 'host',
      themeAttr: 'class,data-theme',
      consentMode: 'automatic',
      analyticsMeasurementMode: 'inherit-analytics-storage',
      identifyMode: 'disabled'
    });

    assertThat(queuedCommands[0].command.opts.defaultConsent).contains('analytics.storage', 'analytics.measurement');

