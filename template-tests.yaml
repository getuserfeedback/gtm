- name: Inject passes a failure handler to injectScript
  code: |-
    let hasFailureHandler = false;

    mock('queryPermission', function(permissionId) {
      return permissionId === 'inject_script';
    });

    mock('encodeUriComponent', function(value) {
      return value;
    });

    mock('injectScript', function(url, onSuccess, onFailure) {
      hasFailureHandler = typeof onFailure === 'function';
      onFailure();
    });

    runCode({
      apiKey: 'test-api-key',
      themeMode: 'host',
      themeAttr: 'class,data-theme',
      consentMode: 'automatic',
      identifyMode: 'disabled'
    });

    assertThat(hasFailureHandler).isEqualTo(true);

